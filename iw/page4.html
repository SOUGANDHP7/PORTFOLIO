<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="page-container">
        <!-- Central text just in case, though the spam covers it -->
        <h1 style="font-size: 4rem; z-index: 10;">IW 😘</h1>
    </div>
    
    <div class="spam-container" id="spamContainer"></div>

    <script>
        const container = document.getElementById('spamContainer');
        const messages = ['IW 😘', 'IW 😘', 'IW ❤️', 'IW 💕', 'IW ✨'];

        function createSpam() {
            const spam = document.createElement('div');
            spam.classList.add('spam-text');
            
            // Random message
            spam.innerText = messages[Math.floor(Math.random() * messages.length)];
            
            // Random position
            spam.style.left = Math.random() * 90 + 'vw';
            
            // Random animation duration
            const duration = Math.random() * 3 + 3; // 3s to 6s
            spam.style.animation = `wavyFloat ${duration}s ease-in-out forwards`;
            
            // Random size
            const size = Math.random() * 2 + 1.5;
            spam.style.fontSize = `${size}rem`;
            
            container.appendChild(spam);

            // Remove element after animation completes to clean up DOM
            setTimeout(() => {
                spam.remove();
            }, duration * 1000);
        }

        // Generate spam continuously
        setInterval(createSpam, 150);
        
        // Initial burst
        for(let i = 0; i < 20; i++) {
            setTimeout(createSpam, Math.random() * 1000);
        }
    </script>
</body>
</html>
